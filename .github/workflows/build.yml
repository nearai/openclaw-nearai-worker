name: Build & Deploy
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override (default: branch-based)'
        required: false
        type: string
      openclaw_version:
        description: 'OpenClaw npm version for worker image (default: Dockerfile ARG)'
        required: false
        type: string
      ironclaw_version:
        description: 'IronClaw version for worker image (default: Dockerfile ARG)'
        required: false
        type: string
      ironclaw_commit:
        description: 'Build ironclaw from source at this commit (nearai/ironclaw). Only builds ironclaw-worker.'
        required: false
        type: string
      build_worker:
        description: 'Build openclaw-nearai-worker'
        required: false
        type: boolean
        default: true
      build_compose_api:
        description: 'Build openclaw-compose-api'
        required: false
        type: boolean
        default: true
      build_updater:
        description: 'Build openclaw-updater'
        required: false
        type: boolean
        default: true
      build_oauth_service:
        description: 'Build ironclaw-oauth-service'
        required: false
        type: boolean
        default: true
      build_ironclaw_worker:
        description: 'Build ironclaw-nearai-worker'
        required: false
        type: boolean
        default: true
      build_ingress:
        description: 'Build openclaw-ingress'
        required: false
        type: boolean
        default: true
      build_bastion:
        description: 'Build openclaw-ssh-bastion'
        required: false
        type: boolean
        default: true
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  REGISTRY: docker.io

jobs:
  # Normal build: all 7 images (skipped when building ironclaw from source)
  build:
    if: ${{ !inputs.ironclaw_commit }}
    name: Build ${{ matrix.name }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: openclaw-nearai-worker
            context: worker
            dockerfile: worker/Dockerfile
            build_script: true
            input_key: build_worker
          - name: openclaw-compose-api
            context: compose-api
            dockerfile: compose-api/Dockerfile
            build_script: false
            input_key: build_compose_api
          - name: openclaw-updater
            context: .
            dockerfile: updater/Dockerfile
            build_script: false
            input_key: build_updater
          - name: ironclaw-oauth-service
            context: oauth-service
            dockerfile: oauth-service/Dockerfile
            build_script: false
            input_key: build_oauth_service
          - name: ironclaw-nearai-worker
            context: ironclaw-worker
            dockerfile: ironclaw-worker/Dockerfile
            build_script: false
            input_key: build_ironclaw_worker
          - name: openclaw-ingress
            context: ingress
            dockerfile: ingress/Dockerfile
            build_script: false
            input_key: build_ingress
          - name: openclaw-ssh-bastion
            context: ssh-bastion
            dockerfile: ssh-bastion/Dockerfile
            build_script: false
            input_key: build_bastion
    steps:
      - name: Check if this service should be built
        id: should_build
        run: |
          # On push events, inputs are empty — build everything.
          # On workflow_dispatch, respect the per-service checkbox.
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ inputs[matrix.input_key] }}" == "false" ]]; then
            echo "Skipping ${{ matrix.name }} (unchecked in workflow dispatch)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout repository
        if: steps.should_build.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Log in to Docker registry
        if: steps.should_build.outputs.skip != 'true'
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Set image repository
        if: steps.should_build.outputs.skip != 'true'
        run: echo "IMAGE_REPOSITORY=${{ vars.DOCKER_REGISTRY_USER }}/${{ matrix.name }}" >> "$GITHUB_ENV"

      - name: Extract image tag from GitHub ref (branch or tag)
        if: steps.should_build.outputs.skip != 'true'
        env:
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          # Use manual input tag if provided via workflow_dispatch
          if [[ -n "$TAG_INPUT" ]]; then
            TAG="$TAG_INPUT"
            echo "Using '${TAG}' image tag from workflow_dispatch input"
          elif [[ "${GITHUB_REF_TYPE}" == 'tag' ]]; then
            TAG=${GITHUB_REF_NAME#v}
            echo "Using '${TAG}' image tag for ${GITHUB_REF_NAME} tag"
          elif [[ "${GITHUB_REF_TYPE}" == 'branch' ]]; then
            TAG='dev'
            echo "Using '${TAG}' image tag for ${GITHUB_REF_NAME} branch"
          else
            echo "Unsupported ref type: ${GITHUB_REF_TYPE}" >&2
            exit 1
          fi

          if [ -z "${TAG}" ]; then
            echo "Unable to parse image tag from ${GITHUB_REF_TYPE}: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          echo "IMAGE_REFERENCE=${{ env.REGISTRY }}/${IMAGE_REPOSITORY}:${TAG}" >> "$GITHUB_ENV"

      - name: Install build dependencies
        if: steps.should_build.outputs.skip != 'true' && matrix.build_script
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo jq

      # Reproducible build path (worker only — uses build-image.sh)
      - name: Build and push reproducible image
        if: steps.should_build.outputs.skip != 'true' && matrix.build_script
        run: |
          ./deploy/build-image.sh --push "${{ env.IMAGE_REFERENCE }}"
        env:
          OPENCLAW_VERSION: ${{ inputs.openclaw_version }}

      - name: Get image digest (reproducible)
        if: steps.should_build.outputs.skip != 'true' && matrix.build_script
        run: |
          DIGEST=$(skopeo inspect oci-archive:./oci.tar | jq -r '.Digest')
          if [ -z "${DIGEST}" ]; then
            echo "Failed to get image digest from OCI archive" >&2
            exit 1
          fi
          echo "IMAGE_DIGEST=${DIGEST}" >> "$GITHUB_ENV"

      # Standard Docker build path (compose-api, updater, ironclaw-worker, ingress, bastion)
      - name: Build and push image
        if: steps.should_build.outputs.skip != 'true' && !matrix.build_script
        uses: docker/build-push-action@v6
        id: docker_build
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.IMAGE_REFERENCE }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            ${{ inputs.ironclaw_version && format('IRONCLAW_VERSION={0}', inputs.ironclaw_version) || '' }}

      - name: Get image digest (standard)
        if: steps.should_build.outputs.skip != 'true' && !matrix.build_script
        run: echo "IMAGE_DIGEST=${{ steps.docker_build.outputs.digest }}" >> "$GITHUB_ENV"

      - name: Generate artifact attestation (GitHub)
        if: steps.should_build.outputs.skip != 'true'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
          subject-digest: ${{ env.IMAGE_DIGEST }}
          push-to-registry: true

      - name: Install cosign
        if: steps.should_build.outputs.skip != 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless)
        if: steps.should_build.outputs.skip != 'true'
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}@${{ env.IMAGE_DIGEST }}"

      - name: Generate build summary
        if: steps.should_build.outputs.skip != 'true'
        run: |
          {
            echo "## ${{ env.IMAGE_REPOSITORY }} docker image"
            echo ""
            echo "- tag: \`${{ env.IMAGE_REFERENCE }}\`"
            echo "- digest: \`${{ env.IMAGE_DIGEST }}\`"
            echo "- sigstore: https://search.sigstore.dev/?hash=${{ env.IMAGE_DIGEST }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Source build: compile ironclaw from a specific commit and build only ironclaw-nearai-worker
  build-ironclaw-from-source:
    if: ${{ inputs.ironclaw_commit }}
    name: Build ironclaw-nearai-worker (from source)
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        if: ${{ inputs.ironclaw_version }}
        run: |
          echo "::error::Cannot specify both ironclaw_commit and ironclaw_version"
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Set image metadata
        env:
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          echo "IMAGE_REPOSITORY=${{ vars.DOCKER_REGISTRY_USER }}/ironclaw-nearai-worker" >> "$GITHUB_ENV"

          if [[ -n "$TAG_INPUT" ]]; then
            TAG="$TAG_INPUT"
          else
            TAG='dev'
          fi
          echo "IMAGE_REFERENCE=${{ env.REGISTRY }}/${{ vars.DOCKER_REGISTRY_USER }}/ironclaw-nearai-worker:${TAG}" >> "$GITHUB_ENV"

      - name: Clone ironclaw source
        env:
          IRONCLAW_COMMIT: ${{ inputs.ironclaw_commit }}
        run: |
          if ! [[ "$IRONCLAW_COMMIT" =~ ^[0-9A-Za-z._/-]+$ ]]; then
            echo "::error::Invalid ironclaw_commit value"
            exit 1
          fi
          git clone --filter=blob:none https://github.com/nearai/ironclaw.git ironclaw-src
          cd ironclaw-src
          git checkout "$IRONCLAW_COMMIT"
          echo "Checked out ironclaw at $(git rev-parse HEAD)"

      - name: Build ironclaw from source (Bookworm container for GLIBC compatibility)
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/ironclaw-src:/src" \
            -v "${{ github.workspace }}/ironclaw-worker:/out" \
            -w /src \
            rust:bookworm \
            sh -c "cargo build --release --locked && cp target/release/ironclaw /out/ironclaw"
          echo "Built ironclaw binary successfully"

      - name: Build and push image
        uses: docker/build-push-action@v6
        id: docker_build
        with:
          context: ironclaw-worker
          file: ironclaw-worker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REFERENCE }}

      - name: Generate artifact attestation (GitHub)
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless)
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}@${{ steps.docker_build.outputs.digest }}"

      - name: Generate build summary
        run: |
          {
            echo "## ironclaw-nearai-worker docker image (from source)"
            echo ""
            echo "- tag: \`${{ env.IMAGE_REFERENCE }}\`"
            echo "- digest: \`${{ steps.docker_build.outputs.digest }}\`"
            echo "- ironclaw commit: \`${{ inputs.ironclaw_commit }}\`"
            echo "- sigstore: https://search.sigstore.dev/?hash=${{ steps.docker_build.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"
