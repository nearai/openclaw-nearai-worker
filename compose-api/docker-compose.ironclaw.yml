# Per-user IronClaw worker template. Used with:
#   docker compose -p openclaw-{user_id} -f docker-compose.ironclaw.yml --env-file .../envs/{user_id}.env up -d
# Env file must set: NEARAI_API_KEY, OPENCLAW_GATEWAY_TOKEN, GATEWAY_PORT, SSH_PORT, OPENCLAW_IMAGE (optional).

services:
  gateway:
    image: ${OPENCLAW_IMAGE:-ironclaw-nearai-worker:local}
    labels:
      openclaw.managed: "true"
      openclaw.service_type: "${SERVICE_TYPE:-ironclaw}"
    environment:
      HOME: /home/agent
      TERM: xterm-256color
      NEARAI_API_KEY: ${NEARAI_API_KEY}
      NEARAI_API_URL: ${NEARAI_API_URL:-https://cloud-api.near.ai/v1}
      NEARAI_MODEL: ${NEARAI_MODEL:-auto}
      # IronClaw v0.26+ behavior is validated primarily on engine v2.
      ENGINE_V2: ${ENGINE_V2:-true}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      GATEWAY_AUTH_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      SSH_PUBKEY: ${SSH_PUBKEY:-}
      BASTION_SSH_PUBKEY: ${BASTION_SSH_PUBKEY:-}
      SERVICE_TYPE: ${SERVICE_TYPE:-ironclaw}
      OPENCLAW_DOMAIN: ${OPENCLAW_DOMAIN:-}
      IRONCLAW_DOMAIN: ${OPENCLAW_DOMAIN:-}
      OPENCLAW_INSTANCE_NAME: ${OPENCLAW_INSTANCE_NAME:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      IRONCLAW_OAUTH_EXCHANGE_URL: ${IRONCLAW_OAUTH_EXCHANGE_URL:-}
      CHANNEL_RELAY_URL: ${CHANNEL_RELAY_URL:-}
      CHANNEL_RELAY_API_KEY: ${CHANNEL_RELAY_API_KEY:-}
      IRONCLAW_INSTANCE_ID: ${IRONCLAW_INSTANCE_ID:-}
    mem_limit: ${MEM_LIMIT:-4g}
    cpus: ${CPUS:-1}
    volumes:
      - config:/home/agent/.ironclaw
      - workspace:/home/agent/workspace
    ports:
      - "${GATEWAY_PORT}:18789"
      - "${SSH_PORT}:2222"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18789/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - worker

volumes:
  config:
  workspace:

networks:
  worker:
    name: ${WORKER_NETWORK}
    external: true
