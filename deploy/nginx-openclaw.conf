# Nginx configuration for OpenClaw Multi-Tenant (HTTPS via certbot)
#
# 1. Replace OPENCLAW_DOMAIN with your domain (e.g. openclaw.example.com).
# 2. Copy this file into your nginx sites, e.g.:
#      sudo cp nginx-openclaw.conf /etc/nginx/sites-available/openclaw
#      sudo ln -s /etc/nginx/sites-available/openclaw /etc/nginx/sites-enabled/
# 3. Run: sudo nginx -t && sudo systemctl reload nginx
# 4. Obtain certificate: sudo certbot --nginx -d OPENCLAW_DOMAIN -d "*.OPENCLAW_DOMAIN"
#    Certbot will add listen 443 ssl and certificate paths to this server block.
#
# DNS: A record for OPENCLAW_DOMAIN and *.OPENCLAW_DOMAIN → your server IP.
#      (includes auth.OPENCLAW_DOMAIN for the OAuth callback proxy)
# Backend: Management API must be listening on 127.0.0.1:47392 (e.g. docker compose -f docker-compose.nginx.yml with port 47392 published).

# Must be in http context (outside server block).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Extract instance name from OAuth state parameter.
# IronClaw formats state as "instance:nonce" for CSRF protection.
# This map extracts the instance name (valid DNS label before the first colon).
map $arg_state $oauth_instance {
    ~*^([a-z0-9-]{1,63}):   $1;
    default                  "";
}

server {
    listen 80;
    server_name OPENCLAW_DOMAIN *.OPENCLAW_DOMAIN;

    location / {
        proxy_pass http://127.0.0.1:47392;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_connect_timeout 75s;

        # Disable buffering for SSE and WebSocket.
        # The backend also sends X-Accel-Buffering: no on SSE responses.
        proxy_buffering off;
        proxy_cache off;
    }
}

# OAuth auth proxy: receives callbacks from OAuth providers (e.g. Google)
# and redirects to the correct instance using the `state` query parameter.
#
# Register this URL as an authorized redirect URI in your OAuth app:
#   https://auth.OPENCLAW_DOMAIN/oauth/callback
#
# State format: "instance:nonce" (CSRF nonce appended after colon).
# Flow: Google → https://auth.OPENCLAW_DOMAIN/oauth/callback?code=abc&state=alice:NONCE
#       → nginx extracts "alice" from state → 302 → https://alice.OPENCLAW_DOMAIN/oauth/callback?code=abc&state=alice:NONCE
#       (full state forwarded so IronClaw can validate CSRF nonce)
server {
    listen 80;
    server_name auth.OPENCLAW_DOMAIN;

    default_type application/json;

    location = /oauth/callback {
        if ($arg_state = "") {
            return 400 '{"error":"missing_state","message":"OAuth callback missing state parameter"}';
        }
        if ($oauth_instance = "") {
            return 400 '{"error":"invalid_state","message":"Could not extract instance name from state parameter"}';
        }
        # Forward full query params so the instance can validate the CSRF nonce.
        return 302 https://$oauth_instance.OPENCLAW_DOMAIN/oauth/callback$is_args$args;
    }

    location / {
        return 404 '{"error":"not_found","message":"Only /oauth/callback is served here"}';
    }
}
