# Nginx configuration for OpenClaw Multi-Tenant (HTTPS via certbot)
#
# 1. Replace OPENCLAW_DOMAIN with your domain (e.g. openclaw.example.com).
# 2. Copy this file into your nginx sites, e.g.:
#      sudo cp nginx-openclaw.conf /etc/nginx/sites-available/openclaw
#      sudo ln -s /etc/nginx/sites-available/openclaw /etc/nginx/sites-enabled/
# 3. Run: sudo nginx -t && sudo systemctl reload nginx
# 4. Obtain certificate: sudo certbot --nginx -d OPENCLAW_DOMAIN -d "*.OPENCLAW_DOMAIN"
#    Certbot will add listen 443 ssl and certificate paths to this server block.
#
# DNS: A record for OPENCLAW_DOMAIN and *.OPENCLAW_DOMAIN → your server IP.
#      (includes auth.OPENCLAW_DOMAIN for the OAuth callback proxy)
# Backend: Management API must be listening on 127.0.0.1:47392 (e.g. docker compose -f docker-compose.nginx.yml with port 47392 published).

# Must be in http context (outside server block).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name OPENCLAW_DOMAIN *.OPENCLAW_DOMAIN;

    location / {
        proxy_pass http://127.0.0.1:47392;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_connect_timeout 75s;

        # Disable buffering for SSE and WebSocket.
        # The backend also sends X-Accel-Buffering: no on SSE responses.
        proxy_buffering off;
        proxy_cache off;
    }
}

# OAuth auth proxy: receives callbacks from OAuth providers (e.g. Google, Notion, GitHub)
# and redirects to the correct instance.
#
# Register this URL as an authorized redirect URI in your OAuth app:
#   https://auth.OPENCLAW_DOMAIN/oauth/callback
#
# Instance routing is handled by compose-api, which decodes the state parameter
# to extract the instance name. Supports both the versioned ic2.* format and the
# legacy instance:nonce format.
#
# Flow: Provider → https://auth.OPENCLAW_DOMAIN/oauth/callback?code=abc&state=...
#       → compose-api extracts instance from state
#       → 307 Temporary Redirect → https://{instance}.OPENCLAW_DOMAIN/oauth/callback?code=abc&state=...
#       (full query string forwarded so IronClaw can validate CSRF nonce)
server {
    listen 80;
    server_name auth.OPENCLAW_DOMAIN;

    default_type application/json;

    location = /oauth/callback {
        proxy_pass http://127.0.0.1:47392/oauth/callback;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404 '{"error":"not_found","message":"Only /oauth/callback is served here"}';
    }
}
